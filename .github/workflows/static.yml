<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiffany McCall | The Nerdy Realtor</title>
  <meta name="description" content="Real estate with personality, strategy, and a little nerd energy in White House, Tennessee." />
  <style>
    :root {
      --bg: #f7f5f1;
      --surface: #ffffff;
      --text: #1f1f1f;
      --muted: #66625d;
      --border: #e7e2da;
      --accent: #2f3b34;
      --accent-2: #c8b79e;
      --max: 1120px;
      --radius: 22px;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247,245,241,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      font-weight: 600;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .button {
      display: inline-block;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      background: var(--accent);
      color: white;
</html>
